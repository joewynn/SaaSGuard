version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw synthetic data generated by generate_synthetic_data.py. Loaded into DuckDB via build_warehouse.py."
    freshness:
      warn_after: {count: 7, period: day}
      error_after: {count: 30, period: day}
    loaded_at_field: signup_date  # proxied for customers; events use timestamp

    tables:
      - name: customers
        description: "Primary entity. One row per customer. churn_date is NULL for active (right-censored)."
        columns:
          - name: customer_id
            description: "UUID primary key."
            tests: [not_null, unique]
          - name: industry
            description: "Customer industry vertical."
            tests: [not_null]
          - name: plan_tier
            description: "Subscription tier."
            tests:
              - not_null
              - accepted_values:
                  values: [starter, growth, enterprise]
          - name: signup_date
            tests: [not_null]
          - name: mrr
            description: "Monthly Recurring Revenue (USD)."
            tests: [not_null]

      - name: usage_events
        description: "Product interaction events. ~50–200 events per customer."
        columns:
          - name: event_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: timestamp
            tests: [not_null]
          - name: event_type
            tests:
              - not_null
              - accepted_values:
                  values: [evidence_upload, monitoring_run, report_view, user_invite, integration_connect, api_call]
          - name: feature_adoption_score
            tests: [not_null]

      - name: support_tickets
        description: "Customer support interactions."
        columns:
          - name: ticket_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: created_date
            tests: [not_null]
          - name: priority
            tests:
              - not_null
              - accepted_values:
                  values: [low, medium, high, critical]
          - name: topic
            tests:
              - not_null
              - accepted_values:
                  values: [compliance, integration, billing, onboarding, feature_request]
          - name: resolution_time
            tests: [not_null]

      - name: gtm_opportunities
        description: "Sales and expansion opportunities."
        columns:
          - name: opp_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: stage
            tests:
              - not_null
              - accepted_values:
                  values: [prospecting, qualification, proposal, closed_won, closed_lost]
          - name: close_date
            tests: [not_null]
          - name: amount
            tests: [not_null]
          - name: sales_owner
            tests: [not_null]

      - name: risk_signals
        description: "Compliance and vendor risk scores per customer."
        columns:
          - name: customer_id
            tests: [not_null, unique]
          - name: compliance_gap_score
            tests: [not_null]
          - name: vendor_risk_flags
            tests: [not_null]


models:
  - name: stg_customers
    description: "Cleaned customers with tenure and lifecycle flags."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: plan_tier
        tests:
          - accepted_values:
              values: [starter, growth, enterprise]
      - name: tenure_days
        tests: [not_null]
      - name: is_active
        tests: [not_null]
      - name: is_early_stage
        tests: [not_null]

  - name: stg_usage_events
    description: "Typed usage events with retention signal flag."
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: is_retention_signal
        tests: [not_null]

  - name: stg_support_tickets
    description: "Typed support tickets with churn signal flag."
    columns:
      - name: ticket_id
        tests: [not_null, unique]
      - name: is_high_priority
        tests: [not_null]
      - name: is_churn_signal
        tests: [not_null]

  - name: stg_gtm_opportunities
    description: "Typed opportunities with expansion risk flag."
    columns:
      - name: opp_id
        tests: [not_null, unique]
      - name: is_open
        tests: [not_null]
      - name: is_expansion_risk
        tests: [not_null]

  - name: stg_risk_signals
    description: "Risk scores with categorical risk_tier."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: compliance_gap_score
        tests: [not_null]
      - name: risk_tier
        tests:
          - not_null
          - accepted_values:
              values: [low, medium, high]
