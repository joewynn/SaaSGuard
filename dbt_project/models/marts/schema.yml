version: 2

models:
  - name: mart_customer_churn_features
    description: >
      ML feature store — one row per active customer with all features required
      by ChurnFeatureExtractor. This is the single source of truth for model
      training and batch scoring. Column names are frozen as part of the
      ChurnModelPort interface contract.
    columns:
      - name: customer_id
        description: "UUID primary key — joins to customers table."
        tests: [not_null, unique]
      - name: industry
        description: "Customer industry vertical."
        tests: [not_null]
      - name: plan_tier
        description: "Subscription tier."
        tests:
          - not_null
          - accepted_values:
              values: [starter, growth, enterprise]
      - name: mrr
        description: "Monthly Recurring Revenue (USD). Used for revenue-at-risk weighting."
        tests: [not_null]
      - name: tenure_days
        description: "Days since signup (or until churn for churned customers)."
        tests: [not_null]
      - name: is_early_stage
        description: "TRUE if tenure_days <= 90. First-90-day cohort is highest churn risk."
        tests: [not_null]
      - name: total_events
        description: "Lifetime count of all usage events."
        tests: [not_null]
      - name: events_last_30d
        description: "Usage events in the last 30 days. Primary decay signal."
        tests: [not_null]
      - name: events_last_7d
        description: "Usage events in the last 7 days. Leading indicator of disengagement."
        tests: [not_null]
      - name: avg_adoption_score
        description: "Average feature_adoption_score across all events. Correlated with retention."
        tests: [not_null]
      - name: days_since_last_event
        description: "Days since most recent usage event. 999 if no events."
        tests: [not_null]
      - name: retention_signal_count
        description: "Count of high-value retention events (integration_connect, api_call, monitoring_run)."
        tests: [not_null]
      - name: integration_connects_first_30d
        description: >
          Count of integration_connect events in the customer's first 30 days of tenure.
          Phase 3 EDA finding: ≥3 integrations → 2.7× lower churn rate (log-rank p < 0.001).
          Phase 4 addition to feature set.
        tests: [not_null]
      - name: tickets_last_30d
        description: "Support tickets opened in the last 30 days."
        tests: [not_null]
      - name: high_priority_tickets
        description: "Lifetime count of high/critical priority tickets. Pre-churn spike signal."
        tests: [not_null]
      - name: avg_resolution_hours
        description: "Average ticket resolution time (hours). Higher = worse CS experience."
        tests: [not_null]

  - name: mart_customer_risk_scores
    description: >
      Customer risk scoring mart for BI dashboards — one row per active customer
      with rule-based churn_score, risk_tier, ARR at risk, and top_risk_drivers.
      Refreshed by dbt run. Used by all 4 Superset dashboards (Phase 6).
    columns:
      - name: customer_id
        description: "UUID primary key."
        tests: [not_null, unique]
      - name: churn_score
        description: "Rule-based churn probability [0,1]. Correlated with ML model output."
        tests: [not_null]
      - name: risk_tier
        description: "Derived tier from churn_score: critical/high/medium/low."
        tests:
          - not_null
          - accepted_values:
              values: [critical, high, medium, low]
      - name: arr_at_risk
        description: "ARR × churn_score. Estimated ARR lost if this customer churns."
        tests: [not_null]
      - name: intervention_value_10pct
        description: "arr_at_risk × 0.10. ARR recoverable at 10% intervention effectiveness."
        tests: [not_null]
      - name: top_risk_drivers
        description: "Comma-separated top-2 active risk flags (e.g. 'low_events, inactive_14d')."
      - name: risk_flag_count
        description: "Total number of active risk flags (0–9)."
        tests: [not_null]
