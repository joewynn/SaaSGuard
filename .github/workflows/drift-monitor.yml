name: Drift Monitor

on:
  schedule:
    - cron: '0 0 * * 0'    # Sunday 00:00 UTC
  workflow_dispatch:

jobs:
  drift-check:
    name: Run Drift Monitoring Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Pull DVC data
        run: uv run dvc pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}

      - name: Connect to ZenML server
        run: uv run zenml connect --url "${{ secrets.ZENML_SERVER_URL }}" --api-key "${{ secrets.ZENML_API_KEY }}"

      - name: Set production stack
        run: uv run zenml stack set saasguard_production

      - name: Run drift monitoring pipeline
        run: uv run python -m pipelines.drift_monitoring_pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}
        # Retraining is triggered automatically inside evaluate_drift_and_trigger()
        # if drift is detected — no separate retrain step needed.
