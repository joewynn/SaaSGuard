name: Scheduled Data Pipeline

on:
  schedule:
    - cron: '0 2 * * 1'    # Every Monday 02:00 UTC
  workflow_dispatch:          # Manual trigger for demos

jobs:
  refresh:
    name: Weekly Data Refresh
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Generate synthetic data
        run: uv run python -m src.infrastructure.data_generation.generate_synthetic_data

      - name: Build DuckDB warehouse
        run: uv run python -m src.infrastructure.db.build_warehouse

      - name: Install dbt-duckdb
        run: uv pip install --system dbt-duckdb==1.9.6

      - name: dbt build (seeds + run + tests)
        run: dbt build --project-dir dbt_project --profiles-dir dbt_project

      - name: Retrain churn model
        run: uv run python -m src.infrastructure.ml.train_churn_model

      - name: Export drift baseline (co-versioned with model)
        run: uv run python -m src.infrastructure.monitoring.drift_detector --export-baseline

      - name: Commit refreshed artifacts
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add models/churn_training_baseline.json models/churn_model_metadata.json
          git diff --staged --quiet || git commit -m "chore(data): weekly data refresh [skip ci]"
          git push

  alert-on-failure:
    name: Alert on Pipeline Failure
    runs-on: ubuntu-latest
    needs: refresh
    if: failure()
    steps:
      - name: Open GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Data pipeline failed — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## Weekly data pipeline failure',
                '',
                `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### Impact',
                '- dbt marts may not have refreshed — `mart_customer_churn_features` and `mart_customer_risk_scores` may be stale or empty',
                '- Churn model may not have retrained — drift baseline may be out of date',
                '- The `/ready` endpoint will return 503 if marts are empty',
                '',
                '### Next steps',
                '1. Check the failed step in the run link above',
                '2. Re-run the pipeline manually via Actions → Scheduled Data Pipeline → Run workflow',
                '3. Verify `/ready` returns 200 after a successful run',
              ].join('\n'),
              labels: ['data-pipeline', 'incident'],
            });
