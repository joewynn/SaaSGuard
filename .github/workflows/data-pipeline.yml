name: Data Pipeline

on:
  schedule:
    - cron: '0 2 * * 1'    # Monday 02:00 UTC
  workflow_dispatch:

jobs:
  data-and-training:
    name: Data Refresh + Model Retrain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Pull DVC data
        run: uv run dvc pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}

      - name: Connect to ZenML server
        run: uv run zenml connect --url "${{ secrets.ZENML_SERVER_URL }}" --api-key "${{ secrets.ZENML_API_KEY }}"

      - name: Set production stack
        run: uv run zenml stack set saasguard_production

      - name: Run data pipeline
        run: uv run python -m pipelines.data_pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}

      - name: Run training pipeline
        run: uv run python -m pipelines.churn_training_pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}

      - name: Export drift baseline
        run: uv run python -m src.infrastructure.monitoring.drift_detector --export-baseline

      - name: Run batch inference
        run: uv run python -m pipelines.churn_inference_pipeline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_AWS_SECRET_ACCESS_KEY }}

      - name: Commit refreshed artifacts
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add models/churn_training_baseline.json models/churn_model_metadata.json
          git diff --staged --quiet || git commit -m "chore(data): weekly data refresh [skip ci]"
          git push

  alert-on-failure:
    name: Alert on Failure
    needs: data-and-training
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Open GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Data pipeline failed — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## Data pipeline failure',
                '',
                `**Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### Impact',
                '- dbt marts may not have refreshed — `mart_customer_churn_features` may be stale or empty',
                '- Churn model may not have retrained — drift baseline may be out of date',
                '- Batch inference scores in `marts.churn_predictions` may be stale',
                '',
                '### Next steps',
                '1. Check the failed step in the run link above',
                '2. Check the ZenML dashboard for step-level details',
                '3. Re-run manually via Actions → Data Pipeline → Run workflow',
              ].join('\n'),
              labels: ['data-pipeline', 'incident'],
            });
