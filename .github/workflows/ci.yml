name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy src/ app/

  # ── TDD – Unit & Integration Tests ───────────────────────────────────────────
  test:
    name: Tests (TDD)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=80

      - name: Generate synthetic data for integration tests
        run: uv run python -m src.infrastructure.data_generation.generate_synthetic_data

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --no-cov

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── dbt Build & Test ──────────────────────────────────────────────────────────
  dbt:
    name: dbt Build & Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate synthetic data and build warehouse
        run: |
          uv sync --frozen --all-extras
          uv run python -m src.infrastructure.data_generation.generate_synthetic_data
          uv run python -m src.infrastructure.db.build_warehouse

      - name: Run dbt build & test
        run: uv run --with dbt-duckdb==1.9.6 dbt build --project-dir dbt_project --profiles-dir dbt_project --target ci

  # ── Docker Build ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, dbt]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push (production stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Container Vulnerability Scan ──────────────────────────────────────────────
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Compute image ref (lowercase, short SHA)
        id: image-ref
        run: |
          echo "ref=ghcr.io/${IMAGE_NAME,,}:sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.image-ref.outputs.ref }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Production Smoke Tests ────────────────────────────────────────────────────
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Pull and smoke-test production image
        run: |
          IMAGE_REF="ghcr.io/${IMAGE_NAME,,}:sha-${GITHUB_SHA::7}"
          docker run -d -p 8000:8000 --name sg-smoke \
            -e ALLOWED_ORIGINS=http://localhost:3000 \
            "$IMAGE_REF"
          sleep 10
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/ready
          docker stop sg-smoke
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GITHUB_SHA: ${{ github.sha }}

  # ── Deploy to Railway ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI and deploy
        run: |
          npm install -g @railway/cli
          railway up --service saasguard-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
