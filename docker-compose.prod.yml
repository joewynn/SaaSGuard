# Production overrides – applied on top of docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  api:
    build:
      target: prod
    environment:
      APP_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8088}
    command:
      - gunicorn
      - app.main:app
      - -c
      - gunicorn.conf.py
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
      labels:
        # Kubernetes-ready labels for future migration
        app.kubernetes.io/name: saasguard-api
        app.kubernetes.io/component: serving
        app.kubernetes.io/part-of: saasguard

  jupyterlab:
    # Disable JupyterLab in production
    profiles: ["dev"]

  superset:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
