site_name: SaaSGuard – Churn & Risk Prediction Platform
site_url: https://joewynn.github.io/SaaSGuard/
site_description: >
  Production-grade B2B SaaS churn and compliance risk prediction platform.
  Built with DDD, TDD, FastAPI, DuckDB, and Apache Superset.
site_author: Joseph M
repo_url: https://github.com/joewynn/SaaSGuard
repo_name: joewynn/SaaSGuard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_signature_annotations: true
            heading_level: 3
            members_order: source
            separate_signature: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

exclude_docs: |
  project-local.md
  presentation/

watch:
  - src
  - docs

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Demo: demo.md
  - Architecture: architecture.md
  - Phase 1 – Scoping:
    - PRD: prd.md
    - Tickets: tickets.md
    - ROI Calculator: roi-calculator.md
    - Growth Framework: growth-framework.md
    - Stakeholder Research (VoC): stakeholder-notes.md
  - Phase 2 – Data Architecture:
    - Data Dictionary: data_dictionary.md
    - Data Generation Methodology: data-generation.md
  - Phase 3 – EDA & Experiments:
    - EDA Findings: eda-findings.md
    - Experiment Design (CS Intervention): experiment-design.md
  - Phase 4 – Predictive Models:
    - Model Card: model-card.md
    - Model Design & Accuracy: model-design.md
    - SHAP Feature Importance: shap-analysis.md
  - Phase 5 – AI/LLM Layer:
    - Ethical Guardrails: ethical-guardrails.md
    - LLM Time Saved (ROI): llm-time-saved.md
  - Phase 6 – Dashboard:
    - Dashboard Guide: dashboard-guide.md
  - Phase 7 – Deployment:
    - Change Management: change-management.md
    - Runbook: runbook.md
  - Phase 8 – Presentation:
    - One-Pager: one-pager.md
  - API Reference:
    - Overview: api-reference/index.md
    - Customer Domain: api-reference/customer.md
    - Usage Domain: api-reference/usage.md
    - Prediction Domain: api-reference/prediction.md
    - GTM Domain: api-reference/gtm.md
    - Application Use Cases: api-reference/use-cases.md
    - AI Summary Domain: api-reference/ai-summary.md
    - Infrastructure: api-reference/infrastructure.md
    - FastAPI Endpoints: API.md
  - ADRs:
    - ADR-001 DuckDB: ADR/ADR-001-duckdb-over-postgres.md
    - ADR-002 DDD: ADR/ADR-002-ddd-architecture.md
    - ADR-003 Railway: ADR/ADR-003-render-deployment.md
    - ADR-004 Drift Detection: ADR/ADR-004-drift-detection.md
  - Changelog: CHANGELOG.md
  - Benchmarks: benchmarks.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/joewynn/SaaSGuard
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/joseph-mwangoka
