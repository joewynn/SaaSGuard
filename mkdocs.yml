site_name: SaaSGuard – Revenue Protection & Expansion Platform
site_url: https://joewynn.github.io/SaaSGuard/
site_description: >
  B2B SaaS NRR intelligence platform. Ingests product usage, support, and GTM
  signals to deliver calibrated 90-day churn probability, expansion propensity,
  SHAP-grounded explanations, and AI-generated CS briefs.
site_author: Joseph M
repo_url: https://github.com/joewynn/SaaSGuard
repo_name: joewynn/SaaSGuard
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_signature_annotations: true
            heading_level: 3
            members_order: source
            separate_signature: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

exclude_docs: |
  project-local.md
  presentation/

watch:
  - src
  - docs

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

